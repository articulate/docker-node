name: Lint

on:
  pull_request:
  merge_group:

jobs:
  setup:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Find Dockerfiles
        id: scan
        run: echo "dockerfiles=$(find . -name Dockerfile | cut -c3- | jq -R -s -c 'split("\n")[:-1]')" >> "$GITHUB_OUTPUT"
    outputs:
      dockerfiles: ${{ steps.scan.outputs.dockerfiles }}
  lint:
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJSON(needs.setup.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # pin@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          ignore: DL3008,DL3016,DL3033,DL3041
  lint-complete:
    if: always()
    runs-on: ubuntu-slim
    needs: [lint]
    steps:
      - name: Verify lint succeeded
        run: |
          [ "${{ needs.lint.result }}" = "success" ] || exit 1
